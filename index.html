<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трейдинг Калькулятор</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-color: #2d3748;
            --long-color: #2ecc71;
            --long-hover: #27ae60;
            --short-color: #e74c3c;
            --short-hover: #c0392b;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-y: auto;
            padding: 40px 20px;
        }

        /* Декоративные мягкие круги на фоне */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(116, 235, 213, 0.2), rgba(172, 182, 229, 0.2));
            z-index: -1;
            filter: blur(40px);
        }
        .circle-1 { width: 300px; height: 300px; top: -100px; left: -50px; }
        .circle-2 { width: 400px; height: 400px; bottom: -150px; right: -50px; }
        .circle-3 { width: 200px; height: 200px; top: 40%; right: 15%; background: linear-gradient(135deg, rgba(255, 154, 158, 0.15), rgba(250, 208, 196, 0.15)); }

        /* Контейнер калькулятора */
        .calculator-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            z-index: 1;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        /* Переключатель Лонг / Шорт */
        .direction-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn-dir {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            opacity: 0.4;
            transform: scale(0.98);
        }

        .btn-long { background-color: var(--long-color); }
        .btn-long:hover { background-color: var(--long-hover); }
        .btn-short { background-color: var(--short-color); }
        .btn-short:hover { background-color: var(--short-hover); }

        .btn-dir.active {
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* Блок полей ввода */
        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #5a6a85;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            background: rgba(255, 255, 255, 0.9);
        }

        .input-group input:focus {
            border-color: #a0aec0;
        }

        hr {
            border: 0;
            height: 1px;
            background: #e2e8f0;
            margin: 25px 0;
        }

        /* Блок результатов */
        .results-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4a5568;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #edf2f7;
            font-size: 15px;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #718096;
        }

        .result-value {
            font-weight: 600;
            color: var(--text-color);
        }

        /* Подсветка */
        .highlight-tvx .result-value { color: #3182ce; font-size: 16px; }
        .highlight-stop .result-value { color: var(--short-color); font-size: 16px; }
        .highlight-tp .result-value { color: var(--long-color); font-size: 16px; }
        
        /* Главные результаты объема */
        .highlight-volume {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.08), rgba(49, 130, 206, 0.08));
            margin-top: 10px;
            padding: 12px 12px;
            border-radius: 10px;
            border: 1px solid rgba(49, 130, 206, 0.15);
        }
        .highlight-volume.tokens {
            background: linear-gradient(135deg, rgba(159, 122, 234, 0.08), rgba(49, 130, 206, 0.08));
            border-color: rgba(159, 122, 234, 0.2);
        }
        .highlight-volume .result-label { color: #2d3748; font-weight: 600; }
        .highlight-volume .result-value { color: #2b6cb0; font-size: 18px; font-weight: 700; }
        .highlight-volume.tokens .result-value { color: #6b46c1; }
    </style>
</head>
<body>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <div class="calculator-card">
        <h2>Расчет позиции</h2>

        <div class="direction-selector">
            <button type="button" class="btn-dir btn-long active" onclick="setDirection('long')">ЛОНГ</button>
            <button type="button" class="btn-dir btn-short" onclick="setDirection('short')">ШОРТ</button>
        </div>

        <div class="inputs-grid">
            <div class="input-group">
                <label for="atr">ATR</label>
                <input type="number" id="atr" step="any" placeholder="Напр. 1.5" oninput="calculate()">
            </div>

            <div class="input-group">
                <label for="keyLevel">Ключевой уровень</label>
                <input type="number" id="keyLevel" step="any" placeholder="Напр. 150" oninput="calculate()">
            </div>

            <div class="input-group full-width">
                <label for="risk">Риск на сделку (в деньгах, $)</label>
                <input type="number" id="risk" step="any" placeholder="Какую сумму готовы потерять?" oninput="calculate()">
            </div>
        </div>

        <hr>

        <div class="results-section">
            <h3>Результаты:</h3>
            
            <div class="result-row">
                <span class="result-label">Размер стопа (ATR * 10%):</span>
                <span class="result-value" id="resStopSize">0.00</span>
            </div>
            
            <div class="result-row">
                <span class="result-label">Люфт (Стоп * 20%):</span>
                <span class="result-value" id="resLuft">0.00</span>
            </div>
            
            <div class="result-row highlight-tvx">
                <span class="result-label">ТВХ (Точка входа):</span>
                <span class="result-value" id="resTvh">0.00</span>
            </div>
            
            <div class="result-row highlight-stop">
                <span class="result-label">Цена СТОПа:</span>
                <span class="result-value" id="resStopPrice">0.00</span>
            </div>

            <div class="result-row">
                <span class="result-label">Размер СТОПа в %:</span>
                <span class="result-value" id="resStopPercent">0.00%</span>
            </div>
            
            <div class="result-row">
                <span class="result-label">Размер ТП (Стоп * 3):</span>
                <span class="result-value" id="resTpSize">0.00</span>
            </div>
            
            <div class="result-row highlight-tp">
                <span class="result-label">Цена Тейк-Профита (1:3):</span>
                <span class="result-value" id="resTpPrice">0.00</span>
            </div>

            <div class="result-row highlight-volume">
                <span class="result-label">Объем позиции (в деньгах):</span>
                <span class="result-value" id="resVolumeMoney">0.00</span>
            </div>

            <div class="result-row highlight-volume tokens">
                <span class="result-label">Объем позиции (в токенах):</span>
                <span class="result-value" id="resVolumeTokens">0.00</span>
            </div>
        </div>
    </div>

    <script>
        let currentDirection = 'long';

        function setDirection(direction) {
            currentDirection = direction;
            document.querySelector('.btn-long').classList.toggle('active', direction === 'long');
            document.querySelector('.btn-short').classList.toggle('active', direction === 'short');
            calculate();
        }

        function calculate() {
            const atr = parseFloat(document.getElementById('atr').value);
            const keyLevel = parseFloat(document.getElementById('keyLevel').value);
            const risk = parseFloat(document.getElementById('risk').value);

            if (isNaN(atr) || isNaN(keyLevel)) {
                resetResults();
                return;
            }

            // Расчет уровней позиции
            const stopSize = atr * 0.10;
            const luft = stopSize * 0.20;
            const tpSize = stopSize * 3;

            let tvh, stopPrice, tpPrice, stopPercent;

            if (currentDirection === 'long') {
                tvh = keyLevel + luft;
                stopPrice = tvh - stopSize;
                tpPrice = tvh + tpSize;
                stopPercent = ((tvh - stopPrice) / tvh) * 100;
            } else {
                tvh = keyLevel - luft;
                stopPrice = tvh + stopSize;
                tpPrice = tvh - tpSize;
                stopPercent = ((stopPrice - tvh) / tvh) * 100;
            }

            // Расчет объемов
            let volumeMoney = 0;
            let volumeTokens = 0;

            if (!isNaN(risk) && risk > 0 && stopSize > 0 && tvh > 0) {
                // Общий объем в деньгах = (Риск * ТВХ) / Стоп в пунктах
                volumeMoney = (risk * tvh) / stopSize;
                // Объем в токенах = Объем в деньгах / ТВХ
                volumeTokens = volumeMoney / tvh;
            }

            // Вывод данных на страницу
            document.getElementById('resStopSize').innerText = stopSize.toFixed(4);
            document.getElementById('resLuft').innerText = luft.toFixed(4);
            document.getElementById('resTvh').innerText = tvh.toFixed(4);
            document.getElementById('resStopPrice').innerText = stopPrice.toFixed(4);
            document.getElementById('resStopPercent').innerText = stopPercent.toFixed(2) + '%';
            document.getElementById('resTpSize').innerText = tpSize.toFixed(4);
            document.getElementById('resTpPrice').innerText = tpPrice.toFixed(4);
            
            // Если риск введен — форматируем результаты, если нет — пишем подсказку
            if (!isNaN(risk)) {
                document.getElementById('resVolumeMoney').innerText = volumeMoney.toFixed(2);
                // Для токенов ставим 4 знака после запятой, так как монеты могут быть дробными (напр. 0.001 BTC)
                document.getElementById('resVolumeTokens').innerText = volumeTokens.toFixed(4);
            } else {
                document.getElementById('resVolumeMoney').innerText = 'Введите риск';
                document.getElementById('resVolumeTokens').innerText = 'Введите риск';
            }
        }

        function resetResults() {
            const fields = ['resStopSize', 'resLuft', 'resTvh', 'resStopPrice', 'resTpSize', 'resTpPrice'];
            fields.forEach(id => document.getElementById(id).innerText = '0.00');
            document.getElementById('resStopPercent').innerText = '0.00%';
            document.getElementById('resVolumeMoney').innerText = '0.00';
            document.getElementById('resVolumeTokens').innerText = '0.00';
        }
    </script>
</body>
</html>
